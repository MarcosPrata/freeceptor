# CD — dispara sozinho quando o workflow "CI" termina com sucesso em main.
# O job "Deploy" usa o environment "production": ele só executa depois que alguém
# aprovar em Actions (Settings → Environments → production → Required reviewers).

name: 🚀 CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Deploy
        run: |
          echo "Deploying ${{ github.event.workflow_run.head_branch }} @ ${{ github.event.workflow_run.head_sha }}..."
          echo "Substitua este passo pelo seu deploy real (Vercel, AWS, etc.)."
